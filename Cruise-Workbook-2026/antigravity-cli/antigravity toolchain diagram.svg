<line x1="320" y1="124" x2="320" y2="160" stroke="#5dcaa5" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>

<!-- ② network layer label -->
<text x="40" y="148" text-anchor="start" fill="#636357" font-family="-apple-system, system-ui, sans-serif" font-size="11" letter-spacing="0.08em">② NETWORK · STARLINK MARITIME</text>

<!-- ③ server layer label -->
<text x="40" y="192" text-anchor="start" fill="#636357" font-family="-apple-system, system-ui, sans-serif" font-size="11" letter-spacing="0.08em">③ SERVER LAYER — DIGITALOCEAN DROPLET ($4/mo)</text>

