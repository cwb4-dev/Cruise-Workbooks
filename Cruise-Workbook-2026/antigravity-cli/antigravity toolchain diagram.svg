<rect x="294" y="134" width="72" height="18" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="0.5"/>
<text x="330" y="147" text-anchor="middle" fill="#c2c0b6" font-family="-apple-system, system-ui, sans-serif" font-size="9" letter-spacing="0.04em">★ STARLINK</text>

