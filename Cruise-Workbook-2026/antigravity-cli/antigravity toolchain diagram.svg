<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Antigravity CLI edition toolchain diagram</title>
<desc>Four-layer diagram showing iPad and Blink Shell connecting via Mosh over Starlink to a DigitalOcean Droplet running Go, Antigravity CLI (agy), Python, and Git, which connects to GitHub and the 8 apps.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- background -->
<rect width="680" height="820" fill="#0a0a0a"/>

<!-- ① hardware layer label -->
<text x="40" y="30" text-anchor="start" fill="#636357" font-family="-apple-system, system-ui, sans-serif" font-size="11" letter-spacing="0.08em">① HARDWARE LAYER</text>

<!-- iPad card -->
<rect x="40" y="44" width="160" height="80" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="120" y="72" text-anchor="middle" fill="#5dcaa5" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600">iPad</text>
<text x="120" y="91" text-anchor="middle" fill="#a8d5c5" font-family="-apple-system, system-ui, sans-serif" font-size="10">Edge browser</text>
<text x="120" y="107" text-anchor="middle" fill="#a8d5c5" font-family="-apple-system, system-ui, sans-serif" font-size="10">Working Copy · AI Studio</text>

<!-- arrow iPad → Blink -->
<line x1="200" y1="84" x2="238" y2="84" stroke="#5dcaa5" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>

<!-- Blink Shell card -->
<rect x="240" y="44" width="160" height="80" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="320" y="72" text-anchor="middle" fill="#5dcaa5" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600">Blink Shell</text>
<text x="320" y="91" text-anchor="middle" fill="#a8d5c5" font-family="-apple-system, system-ui, sans-serif" font-size="10">mosh --verbose</text>
<text x="320" y="107" text-anchor="middle" fill="#a8d5c5" font-family="-apple-system, system-ui, sans-serif" font-size="10">SSH key: Google-Droplet</text>

